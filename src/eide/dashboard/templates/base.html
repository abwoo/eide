<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}EIDE{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #f8f9fb; }
    .sidebar-link { display: flex; align-items: center; gap: 0.625rem; padding: 0.5rem 0.75rem; border-radius: 0.375rem; font-size: 0.8125rem; font-weight: 500; color: #64748b; transition: all 0.12s; text-decoration: none; }
    .sidebar-link:hover { background: #f1f5f9; color: #1e293b; }
    .sidebar-link.active { background: #eef2ff; color: #4f46e5; font-weight: 600; }
    .card { background: #fff; border-radius: 0.75rem; box-shadow: 0 1px 2px rgba(0,0,0,0.04); border: 1px solid #e9edf2; padding: 1.25rem; }
    .card-header { font-size: 0.75rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.875rem; }
    .stat-value { font-size: 1.75rem; font-weight: 700; color: #0f172a; line-height: 1.2; }
    .stat-label { font-size: 0.75rem; color: #94a3b8; font-weight: 500; }
    .btn { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.5rem 0.875rem; border-radius: 0.375rem; font-size: 0.8125rem; font-weight: 500; transition: all 0.12s; cursor: pointer; border: none; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-ghost { background: transparent; color: #64748b; }
    .btn-ghost:hover { background: #f1f5f9; }
    .input { padding: 0.5rem 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.375rem; font-size: 0.8125rem; outline: none; transition: border-color 0.12s, box-shadow 0.12s; background: #fff; }
    .input:focus { border-color: #a5b4fc; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .badge { display: inline-flex; align-items: center; padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.6875rem; font-weight: 500; }
    .tag { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.125rem 0.5rem; border-radius: 0.25rem; font-size: 0.6875rem; font-weight: 500; background: #f1f5f9; color: #475569; }
    .diff-add { background: #f0fdf4; border-left: 3px solid #22c55e; }
    .diff-remove { background: #fef2f2; border-left: 3px solid #ef4444; }
    .diff-modify { background: #eff6ff; border-left: 3px solid #3b82f6; }
    .highlight-add { background: #dcfce7; color: #166534; padding: 0.0625rem 0.25rem; border-radius: 0.125rem; }
    .highlight-remove { background: #fecaca; color: #991b1b; padding: 0.0625rem 0.25rem; border-radius: 0.125rem; }
    .diff-line { display: flex; align-items: center; gap: 0.75rem; padding: 0.375rem 0.75rem; font-family: 'SF Mono', 'Monaco', 'Consolas', monospace; font-size: 0.75rem; border-radius: 0.25rem; }
    .diff-line-add { background: #f0fdf4; color: #166534; }
    .diff-line-remove { background: #fef2f2; color: #991b1b; }
    .diff-line-neutral { color: #64748b; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { text-align: left; padding: 0.5rem 0.75rem; font-size: 0.6875rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #f1f5f9; }
    .data-table td { padding: 0.5rem 0.75rem; font-size: 0.8125rem; border-bottom: 1px solid #f8f9fb; }
    .data-table tr { transition: background 0.08s; }
    .data-table tbody tr:hover { background: #f8fafc; }
    .truncate-label { max-width: 10rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; height: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
  </style>
</head>
<body class="min-h-screen antialiased text-[#0f172a]">
  <div class="flex h-screen">
    <aside class="w-56 bg-white border-r border-[#e9edf2] flex flex-col flex-shrink-0 hidden md:flex">
      <div class="p-4 border-b border-[#e9edf2]">
        <a href="/" class="flex items-center gap-2">
          <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          </div>
          <span class="text-base font-bold tracking-tight text-[#0f172a]">EIDE</span>
        </a>
      </div>
      <nav class="flex-1 p-2 space-y-0.5 overflow-y-auto scrollbar-thin">
        <a href="/" class="sidebar-link {% if request.url.path == '/' %}active{% endif %}">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          Overview
        </a>
        <a href="/experiments" class="sidebar-link {% if '/experiments' in request.url.path and '/experiments/' not in request.url.path %}active{% endif %}">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
          Experiments
        </a>
        <a href="/diff" class="sidebar-link {% if '/diff' in request.url.path %}active{% endif %}">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
          Diff
        </a>
          <a href="/graph" class="sidebar-link {% if '/graph' in request.url.path %}active{% endif %}">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/></svg>
          Graph
        </a>
        <div class="border-t border-[#e9edf2] my-2"></div>
        <a href="/create" class="sidebar-link {% if '/create' in request.url.path %}active{% endif %}">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"/></svg>
          New Run
        </a>
      </nav>
      <div class="p-3 border-t border-[#e9edf2] text-[10px] text-[#94a3b8]">
        <div class="flex items-center justify-between">
          <span>EIDE v{{ version }}</span>
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
        </div>
      </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">
      <header class="bg-white border-b border-[#e9edf2] px-4 md:px-6 py-2.5 flex items-center justify-between flex-shrink-0">
        <div class="flex items-center gap-3">
          <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="md:hidden p-1.5 -ml-1.5 text-[#64748b] hover:text-[#0f172a]">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <h1 class="text-sm font-semibold text-[#0f172a]">{% block page_title %}Dashboard{% endblock %}</h1>
        </div>
        <div class="flex items-center gap-2">
          <form method="get" action="/experiments" class="relative">
            <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-[#94a3b8]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" name="search" placeholder="Search experiments..." class="input pl-8 py-1.5 w-36 md:w-56">
          </form>
          <a href="/diff" class="btn btn-secondary text-xs py-1.5 hidden md:inline-flex">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
            Compare
          </a>
        </div>
      </header>

      <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-[#e9edf2] px-4 py-2 space-y-1">
        <a href="/" class="sidebar-link {% if request.url.path == '/' %}active{% endif %}">Overview</a>
        <a href="/experiments" class="sidebar-link {% if '/experiments' in request.url.path %}active{% endif %}">Experiments</a>
        <a href="/diff" class="sidebar-link {% if '/diff' in request.url.path %}active{% endif %}">Diff</a>
        <a href="/graph" class="sidebar-link {% if '/graph' in request.url.path %}active{% endif %}">Graph</a>
        <a href="/create" class="sidebar-link {% if '/create' in request.url.path %}active{% endif %}">New Run</a>
      </div>

      <main class="flex-1 overflow-auto p-4 md:p-6 scrollbar-thin">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
</body>
</html>
