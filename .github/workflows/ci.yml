name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install hatchling ruff mypy
          pip install -e ".[dashboard]"
      - name: Ruff check
        run: ruff check src/
      - name: Ruff format
        run: ruff format --check src/
      - name: mypy
        run: mypy src/

  unit:
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          pip install hatchling pytest anyio httpx
          pip install -e ".[dashboard]"
      - name: Run unit & e2e tests
        run: |
          pytest tests/test_eide.py tests/test_cli.py tests/test_graph.py tests/test_mcp.py tests/test_dashboard.py tests/test_e2e.py tests/test_search.py tests/test_export_import.py tests/test_impact.py tests/test_intelligence.py tests/test_replay.py -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install hatchling pytest anyio httpx pytest-playwright uvicorn
          pip install -e ".[dashboard]"
      - name: Install Playwright browsers
        run: python -m playwright install chromium
      - name: Run frontend tests
        run: pytest tests/test_frontend.py -v --tb=short
